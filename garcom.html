<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barão - Sistema Garçom</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/garcom.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Tela de Login -->
    <div id="login-screen" class="screen active">
        <div class="western-background"></div>
        <div class="login-container">
            <div class="logo-container">
               <img src="img/Logo barão png.png" alt="Bar do Barão" class="logo-image">
            </div>
            
            <div class="login-card">
                <h1 class="western-title">GARÇOM</h1>
                
                <form id="login-form" data-testid="login-form">
                    <div class="form-group">
                        <label for="username">Seu Nome</label>
                        <input type="text" id="username" name="username" placeholder="Digite seu nome" data-testid="username-input" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" data-testid="login-button">
                        ENTRAR
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Tela Principal -->
    <div id="main-screen" class="screen">
        <div class="western-background"></div>
        
        <!-- Header -->
        <header class="main-header">
            <img src="img/Logo barão png.png" alt="Bar do Barão" class="logo-image">
            
            <div class="header-actions">
                <div class="date-selector" data-testid="date-selector">
                    <button class="btn-icon" id="prev-date" data-testid="prev-date-button">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="date-display" data-testid="date-display">
                        <span id="current-date">26/02/2026</span>
                    </div>
                    <button class="btn-icon" id="next-date" data-testid="next-date-button">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                
                <button class="btn btn-secondary" id="logout-btn" data-testid="logout-button">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-action" id="view-orders-btn" data-testid="view-orders-button">
                <i class="fas fa-receipt"></i> VISUALIZAR COMANDAS
            </button>
            <button class="btn btn-action" id="new-order-btn" data-testid="new-order-button">
                <i class="fas fa-plus-circle"></i> REALIZAR PEDIDO
            </button>
            <button class="btn btn-edit" id="edit-menu-btn" data-testid="edit-menu-button">
                <i class="fas fa-edit"></i> EDITAR CARDÁPIO
            </button>
        </div>

        <!-- Título Mesas -->
        <h2 class="section-title">MESAS</h2>

        <!-- Grid de Mesas -->
        <div class="tables-grid" id="tables-grid" data-testid="tables-grid">
            <!-- Mesas serão geradas dinamicamente pelo JavaScript -->
        </div>
    </div>

    <!-- Modal de Cardápio -->
    <div id="menu-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 class="modal-title">Cardápio - Mesa <span id="selected-table-number">1</span></h2>
                <button class="modal-close" data-testid="close-menu-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="menu-categories" data-testid="menu-categories">
                    <button class="category-btn" data-category="recentes" data-testid="category-recentes"><i class="fas fa-history"></i> Recentes</button>
                    <button class="category-btn" data-category="todos" data-testid="category-todos">Todos</button>
                    <button class="category-btn active" data-category="entradas" data-testid="category-entradas">Entradas</button>
                    <button class="category-btn" data-category="pratos" data-testid="category-pratos">Pratos</button>
                    <button class="category-btn" data-category="porcoes" data-testid="category-porcoes">Porções</button>
                    <button class="category-btn" data-category="sobremesas" data-testid="category-sobremesas">Sobremesas</button>
                    <button class="category-btn" data-category="lanches-artesanais" data-testid="category-lanches">Lanches Artesanais</button>
                    <button class="category-btn" data-category="refrigerantes" data-testid="category-refrigerantes">Refrigerantes</button>
                    <button class="category-btn" data-category="chopp" data-testid="category-chopp">Chopp</button>
                    <button class="category-btn" data-category="bebidas" data-testid="category-bebidas">Bebidas</button>
                    <button class="category-btn" data-category="destilados" data-testid="category-destilados">Destilados</button>
                    <button class="category-btn" data-category="drinks" data-testid="category-drinks">Drinks</button>
                    <button class="category-btn" data-category="drinks-sem-alcool" data-testid="category-drinks-sem-alcool">Drinks s/alcool</button>
                    <button class="category-btn" data-category="caipirinhas" data-testid="category-caipirinhas">Caipirinhas</button>
                </div>
                
                <div class="menu-items" id="menu-items" data-testid="menu-items">
                    <!-- Items serão carregados dinamicamente -->
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-primary" id="add-to-order-btn" data-testid="add-to-order-button">
                    <i class="fas fa-check"></i> ADICIONAR PEDIDO
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Comanda -->
    <div id="bill-modal" class="modal">
        <div class="modal-content modal-medium">
            <div class="modal-header">
                <h2 class="modal-title">Mesa <span id="bill-table-number">2</span></h2>
                <button class="modal-close" data-testid="close-bill-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body dark-modal">
                <p class="bill-subtitle">FECHAMENTO DE CONTA</p>
                
                <div class="consumption-section">
                    <h3 class="consumption-title">CONSUMO</h3>
                    <div id="bill-items" class="bill-items" data-testid="bill-items">
                        <!-- Items da comanda -->
                    </div>
                </div>
                
                <div class="bill-total" data-testid="bill-total">
                    <span>TOTAL</span>
                    <span class="total-amount" id="bill-total-amount">R$ 0,00</span>
                </div>
                
                <div class="payment-section">
                    <label class="payment-label">FORMA DE PAGAMENTO</label>
                    <select id="payment-method" class="payment-select" data-testid="payment-method-select">
                        <option value="">Selecione...</option>
                        <option value="credito">Cartão de Crédito</option>
                        <option value="debito">Cartão de Débito</option>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="pix">PIX</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-success" id="finalize-bill-btn" data-testid="finalize-bill-button">
                    <i class="fas fa-check-circle"></i> FINALIZAR E LIBERAR MESA
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Edição de Cardápio -->
    <div id="edit-menu-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 class="modal-title">Editar Cardápio</h2>
                <button class="modal-close" data-testid="close-edit-menu-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="edit-menu-actions">
                    <button class="btn btn-primary" id="add-menu-item-btn" data-testid="add-menu-item-button">
                        <i class="fas fa-plus"></i> Adicionar Produto
                    </button>
                </div>
                
                <div class="edit-menu-list" id="edit-menu-list" data-testid="edit-menu-list">
                    <!-- Lista de produtos editáveis -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div id="register-modal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 class="modal-title">Cadastrar Garçom</h2>
                <button class="modal-close" data-testid="close-register-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <form id="register-form" data-testid="register-form">
                    <div class="form-group">
                        <label for="register-name">Nome Completo</label>
                        <input type="text" id="register-name" name="name" data-testid="register-name-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-username">Usuário</label>
                        <input type="text" id="register-username" name="username" data-testid="register-username-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password">Senha</label>
                        <input type="password" id="register-password" name="password" data-testid="register-password-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-confirm-password">Confirmar Senha</label>
                        <input type="password" id="register-confirm-password" name="confirmPassword" data-testid="register-confirm-password-input" required>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-register-btn" data-testid="cancel-register-button">
                    Cancelar
                </button>
                <button class="btn btn-primary" id="submit-register-btn" data-testid="submit-register-button">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Seleção de Mesa -->
    <div id="select-table-modal" class="modal">
        <div class="modal-content modal-medium">
            <div class="modal-header">
                <h2 class="modal-title">Selecione a Mesa</h2>
                <button class="modal-close" data-testid="close-select-table-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="table-selection-grid" class="table-selection-grid">
                    <!-- Mesas geradas via JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/garcom.js"></script>
</body>
</html>
