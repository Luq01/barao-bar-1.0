<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎛️ Painel do Operador</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    :root {
      --bg: #07080d; --surface: #0f1018; --surface2: #161822;
      --border: #1f2130; --accent: #e8ff47;
      --green: #4ade80; --red: #f87171; --blue: #60a5fa; --orange: #fb923c;
      --text: #e8e8f0; --muted: #555570; --muted2: #888899;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .logo span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .ws-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted2); font-family: 'DM Mono', monospace; }
    .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .ws-dot.connected { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .ws-dot.error { background: var(--red); }
    .btn-tab-debug { background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 6px; padding: 4px 10px; font-size: 0.7rem; font-family: 'DM Mono', monospace; cursor: pointer; }
    .btn-tab-debug:hover { border-color: var(--accent); color: var(--accent); }

    .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 56px); }
    .main { padding: 24px; overflow-y: auto; }

    .section-title {
      font-family: 'Syne', sans-serif; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted);
      margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    .now-playing {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px; min-height: 76px;
      transition: border-color 0.3s, background 0.3s;
    }
    .now-playing.active { background: linear-gradient(135deg,#1a1f0a,#0f1810); border-color: rgba(74,222,128,0.25); }
    .playing-icon { font-size: 28px; flex-shrink: 0; }
    .playing-info { flex: 1; min-width: 0; }
    .playing-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 3px; font-family: 'DM Mono', monospace; }
    .now-playing.active .playing-label { color: var(--green); }
    .playing-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playing-client { font-size: 0.78rem; color: var(--muted2); margin-top: 2px; }
    .now-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .queue-list { display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .card-pos { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .card-client { font-size: 0.75rem; color: var(--muted2); }
    .card-obs { font-size: 0.72rem; color: var(--muted); font-style: italic; margin-top: 1px; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn { border: none; border-radius: 8px; padding: 7px 13px; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
    .btn:hover { opacity: 0.8; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }
    .btn-yt     { background: #ff0000; color: #fff; }
    .btn-next   { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .btn-reject { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.15); }
    .btn-play   { background: rgba(96,165,250,0.12); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }

    .empty-state { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 0.85rem; }
    .empty-state .e-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .counter { background: var(--accent); color: #07080d; font-family: 'DM Mono', monospace; font-size: 0.65rem; border-radius: 20px; padding: 1px 7px; margin-left: 6px; }

    .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px 8px; font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; text-align: center; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; letter-spacing: 0.05em; text-transform: uppercase; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
    .tab-content.active { display: block; }

    .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-title { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .history-meta { font-size: 0.7rem; color: var(--muted2); display: flex; align-items: center; justify-content: space-between; }

    #debugLog { font-family: 'DM Mono', monospace; font-size: 0.67rem; line-height: 1.7; color: var(--muted2); }
    .log-line { padding: 1px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-ok   { color: var(--green); }
    .log-err  { color: var(--red); }
    .log-info { color: var(--blue); }
    .log-warn { color: var(--orange); }

    .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 1px 6px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 6px; }
    .badge-tocado    { background: rgba(96,165,250,0.12); color: var(--blue); }
    .badge-rejeitado { background: rgba(248,113,113,0.1); color: var(--red); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-size: 0.82rem; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); z-index: 999; transform: translateY(70px); opacity: 0; transition: transform 0.3s, opacity 0.3s; max-width: 320px; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎛️ Painel do <span>Operador</span></div>
  <div class="topbar-right">
    <div class="ws-status">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">Conectando...</span>
    </div>
    <button class="btn-tab-debug" onclick="switchTab('debug')">Debug</button>
  </div>
</div>

<div class="layout">
  <div class="main">
    <div class="section-title">Tocando agora</div>
    <div class="now-playing" id="nowPlaying">
      <span class="playing-icon">🔇</span>
      <div class="playing-info">
        <div class="playing-label">Nenhuma música</div>
        <div class="playing-title" style="color:var(--muted2);font-size:0.9rem">Aguardando pedidos do totem...</div>
      </div>
    </div>

    <div class="section-title">Fila <span class="counter" id="queueCounter">0</span></div>
    <div class="queue-list" id="queueList">
      <div class="empty-state"><span class="e-icon">🎵</span>Fila vazia. Aguardando pedidos.</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" id="tab-historico" onclick="switchTab('historico')">Histórico</div>
      <div class="tab" id="tab-debug" onclick="switchTab('debug')">Debug</div>
    </div>
    <div class="tab-content active" id="content-historico">
      <div id="historyList">
        <div class="empty-state" style="padding:24px 0;font-size:0.78rem"><span class="e-icon" style="font-size:24px">📋</span>Nada ainda.</div>
      </div>
    </div>
    <div class="tab-content" id="content-debug">
      <div id="debugLog"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon">🎵</span>
  <div>
    <div id="toastTitle" style="font-weight:500"></div>
    <div id="toastSub" style="font-size:0.72rem;color:var(--muted2);margin-top:1px"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api/pedidos';

  // ─── Debug ────────────────────────────────────────────────────────────────
  function dbg(msg, tipo) {
    const el = document.getElementById('debugLog');
    const t = new Date().toLocaleTimeString('pt-BR');
    const div = document.createElement('div');
    div.className = 'log-line' + (tipo ? ' log-' + tipo : '');
    div.textContent = '[' + t + '] ' + msg;
    el.prepend(div);
    if (el.children.length > 100) el.removeChild(el.lastChild);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('content-' + name).classList.add('active');
  }

  // ─── WebSocket ────────────────────────────────────────────────────────────
  function conectarWS() {
    dbg('Conectando WS...', 'info');
    try {
      const sock = new SockJS('http://localhost:8080/ws');
      const client = Stomp.over(sock);
      client.debug = null;

      client.connect({}, () => {
        dbg('WS conectado!', 'ok');
        document.getElementById('wsDot').className = 'ws-dot connected';
        document.getElementById('wsLabel').textContent = 'WS conectado';

        client.subscribe('/topic/fila', msg => {
          dbg('WS fila recebida', 'ok');
          try { renderFila(JSON.parse(msg.body)); }
          catch(e) { dbg('Erro parse fila: ' + e.message, 'err'); }
        });

        client.subscribe('/topic/pedidos', msg => {
          try {
            const ev = JSON.parse(msg.body);
            dbg('WS evento: ' + ev.tipo, 'info');
            if (ev.tipo === 'NOVO_PEDIDO') {
              toast('🎵', 'Novo pedido!', ev.pedido.nomeCliente + ' — "' + ev.pedido.tituloMusica + '"');
            }
            if (ev.tipo === 'TOCANDO_AGORA') {
              toast('▶', 'Próxima música!', ev.pedido.tituloMusica);
              abrirYT(ev.pedido.tituloMusica);
            }
          } catch(e) { dbg('Erro parse evento: ' + e.message, 'err'); }
        });

      }, err => {
        dbg('Falha WS: ' + (err.headers ? err.headers.message : JSON.stringify(err)), 'err');
        document.getElementById('wsDot').className = 'ws-dot error';
        document.getElementById('wsLabel').textContent = 'WS desconectado';
        setTimeout(conectarWS, 4000);
      });
    } catch(e) {
      dbg('Exceção WS: ' + e.message, 'err');
      setTimeout(conectarWS, 4000);
    }
  }

  // ─── Polling (garante atualização mesmo sem WS) ───────────────────────────
  async function carregarFila(silencioso) {
    if (!silencioso) dbg('GET /api/pedidos...', 'info');
    try {
      const res = await fetch(API, { cache: 'no-store' });
      if (!silencioso) dbg('HTTP ' + res.status, res.ok ? 'ok' : 'err');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const fila = await res.json();
      if (!silencioso) dbg('Fila: ' + fila.length + ' itens → ' + JSON.stringify(fila.map(p => p.status)), 'ok');
      renderFila(fila);
    } catch(e) {
      dbg('Erro GET fila: ' + e.message, 'err');
    }
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function renderFila(fila) {
    const tocando   = fila.find(p => p.status === 'TOCANDO');
    const aprovados = fila.filter(p => p.status === 'APROVADO');
    renderNowPlaying(tocando);
    document.getElementById('queueCounter').textContent = aprovados.length;
    const list = document.getElementById('queueList');
    if (aprovados.length === 0) {
      list.innerHTML = '<div class="empty-state"><span class="e-icon">🎵</span>Fila vazia.</div>';
      return;
    }
    list.innerHTML = '';
    aprovados.forEach((p, i) => {
      const d = document.createElement('div');
      d.className = 'card';
      d.innerHTML =
        '<div class="card-pos">' + (i+1) + '</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + esc(p.tituloMusica) + '</div>' +
          '<div class="card-client">👤 ' + esc(p.nomeCliente) + '</div>' +
          (p.observacao ? '<div class="card-obs">💬 ' + esc(p.observacao) + '</div>' : '') +
        '</div>' +
        '<div class="card-actions">' +
          (!tocando ? '<button class="btn btn-play" onclick="tocar(' + p.id + ',\'' + esc(p.tituloMusica).replace(/'/g,"\\'") + '\')">▶ Tocar</button>' : '') +
          '<button class="btn btn-reject" onclick="rejeitar(' + p.id + ')">✕</button>' +
        '</div>';
      list.appendChild(d);
    });
  }

  function renderNowPlaying(p) {
    const el = document.getElementById('nowPlaying');
    if (!p) {
      el.className = 'now-playing';
      el.innerHTML =
        '<span class="playing-icon">🔇</span>' +
        '<div class="playing-info">' +
          '<div class="playing-label">Nenhuma música</div>' +
          '<div class="playing-title" style="color:var(--muted2);font-size:0.9rem">Aguardando pedidos...</div>' +
        '</div>';
      return;
    }
    el.className = 'now-playing active';
    el.innerHTML =
      '<span class="playing-icon">🎵</span>' +
      '<div class="playing-info">' +
        '<div class="playing-label">Tocando agora</div>' +
        '<div class="playing-title">' + esc(p.tituloMusica) + '</div>' +
        '<div class="playing-client">👤 ' + esc(p.nomeCliente) + (p.observacao ? ' · 💬 ' + esc(p.observacao) : '') + '</div>' +
      '</div>' +
      '<div class="now-actions">' +
        '<button class="btn btn-yt" onclick="abrirYT(\'' + esc(p.tituloMusica).replace(/'/g,"\\'") + '\')">▶ YouTube</button>' +
        '<button class="btn btn-next" onclick="concluir(' + p.id + ')">⏭ Próxima</button>' +
        '<button class="btn btn-reject" onclick="rejeitar(' + p.id + ')">✕ Pular</button>' +
      '</div>';
  }

  // ─── Ações ────────────────────────────────────────────────────────────────
  async function tocar(id, titulo) {
    dbg('Tocar id=' + id, 'info');
    try {
      const res = await fetch(API + '/' + id + '/tocar', { method: 'POST' });
      dbg('tocar → ' + res.status, res.ok ? 'ok' : 'err');
      abrirYT(titulo);
      await carregarFila();
    } catch(e) { dbg('Erro tocar: ' + e.message, 'err'); }
  }

  async function concluir(id) {
    dbg('Concluir id=' + id, 'info');
    try {
      const pedido = await (await fetch(API + '/' + id)).json();
      const res = await fetch(API + '/' + id + '/concluir', { method: 'POST' });
      dbg('concluir → ' + res.status, res.ok ? 'ok' : 'err');
      adicionarHistorico(pedido, 'tocado');
      await carregarFila();
    } catch(e) { dbg('Erro concluir: ' + e.message, 'err'); }
  }

  async function rejeitar(id) {
    dbg('Rejeitar id=' + id, 'info');
    try {
      const pedido = await (await fetch(API + '/' + id)).json();
      const res = await fetch(API + '/' + id + '/rejeitar', { method: 'POST' });
      dbg('rejeitar → ' + res.status, res.ok ? 'ok' : 'err');
      adicionarHistorico(pedido, 'rejeitado');
      await carregarFila();
    } catch(e) { dbg('Erro rejeitar: ' + e.message, 'err'); }
  }

  function abrirYT(titulo) {
    dbg('Abrindo YouTube: ' + titulo, 'info');
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(titulo), '_blank');
  }

  function adicionarHistorico(p, tipo) {
    const list = document.getElementById('historyList');
    if (list.querySelector('.empty-state')) list.innerHTML = '';
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML =
      '<div class="history-title">' + esc(p.tituloMusica) + '</div>' +
      '<div class="history-meta"><span>👤 ' + esc(p.nomeCliente) + '</span>' +
      '<span class="badge badge-' + tipo + '">' + tipo + '</span></div>';
    list.prepend(item);
  }

  let toastTimer;
  function toast(icon, title, sub) {
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastSub').textContent = sub;
    const el = document.getElementById('toast');
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 4500);
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  dbg('Painel iniciando...', 'info');
  carregarFila();                         // carrega imediato
  setInterval(() => carregarFila(true), 3000); // polling silencioso a cada 3s
  conectarWS();                           // WS por cima
</script>
</body>
</html>
