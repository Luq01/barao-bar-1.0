spring.application.name=music-queue

# Servidor
server.port=8080

# H2 - banco em memória (dados persistem enquanto o app está rodando)
spring.datasource.url=jdbc:h2:file:./data/musicqueue;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logs
logging.level.com.musicqueue=DEBUG
